name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*' # Trigger on tags matching v*, i.e. v1.0.0, v20.15.10

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to publish to GitHub Packages

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9 # Use latest pnpm version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Upgraded to match user's local Node 22 environment
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'
          # Defaults to the user or organization that owns the workflow file
          scope: '@bogegit'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # pnpm publish executes pre-publish scripts like build if they exist,
      # but here we run pack first to match previous workflow
      - name: Build project
        run: pnpm run build

      - name: Publish package
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

