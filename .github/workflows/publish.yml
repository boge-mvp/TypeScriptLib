name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*' # Trigger on tags matching v*, i.e. v1.0.0, v20.15.10

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to publish to GitHub Packages

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9 # Use latest pnpm version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Upgraded to match user's local Node 22 environment
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'
          # Defaults to the user or organization that owns the workflow file
          scope: '@bogegit'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update package version from tag
        run: |
          # GITHUB_REF_NAME contains the tag name, e.g., "v2.0.8"
          # Remove the 'v' prefix
          VERSION=${GITHUB_REF_NAME#v}
          echo "Setting package version to $VERSION"
          npm version $VERSION --no-git-tag-version --allow-same-version

      # pnpm publish executes pre-publish scripts like build if they exist,
      # but here we run pack first to match previous workflow
      - name: Build project
        run: pnpm run build

      - name: Publish package
        run: |
          # GITHUB_REF_NAME contains the tag name, e.g., "v2.0.8-beta.0"
          # Remove the 'v' prefix
          VERSION=${GITHUB_REF_NAME#v}
          
          # Check if the version is a pre-release (contains '-')
          if [[ "$VERSION" == *"-"* ]]; then
            echo "Pre-release version detected: $VERSION. Publishing with 'beta' tag..."
            pnpm publish --tag beta --no-git-checks
          else
            echo "Stable version detected: $VERSION. Publishing with 'latest' tag..."
            pnpm publish --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

